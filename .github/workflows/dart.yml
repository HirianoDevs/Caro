name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # Clonar o projeto
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalar Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # pode ajustar

      # Verificar versão
      - name: Flutter version
        run: flutter --version

      # Instalar dependências
      - name: Install dependencies
        run: flutter pub get

      # Analisar código
      - name: Analyze project
        run: flutter analyze

      # Rodar testes (opcional)
      - name: Run tests
        run: flutter test

      # Build APK (release)
      - name: Build APK
        run: flutter build apk --release

      # Upload do APK como artefato
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
